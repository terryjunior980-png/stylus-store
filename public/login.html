<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STYLUS — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; color: #fff; font-family: 'Helvetica Neue', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

    .login-nav {
      padding: 1.5rem 2.5rem;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .login-nav-logo {
      font-family: 'Space Mono', monospace;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: #fff;
      text-decoration: none;
    }
    .login-nav-back {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: #888;
      text-decoration: none;
      transition: color 0.2s;
    }
    .login-nav-back:hover { color: #fff; }

    .login-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: radial-gradient(ellipse at 50% 50%, rgba(201,168,76,0.05) 0%, transparent 70%);
    }

    .login-box {
      background: #0a0a0a;
      border: 1px solid #222;
      padding: 3rem;
      width: 100%;
      max-width: 420px;
    }

    .login-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem;
      font-weight: 300;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .login-sub {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: #555;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .tabs {
      display: flex;
      margin-bottom: 2rem;
      border-bottom: 1px solid #222;
    }
    .tab {
      flex: 1;
      padding: 0.75rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-align: center;
      cursor: pointer;
      color: #555;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
      background: none;
      border-left: none;
      border-right: none;
      border-top: none;
    }
    .tab.active { color: #c9a84c; border-bottom-color: #c9a84c; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .form-group input {
      width: 100%;
      background: #111;
      border: 1px solid #222;
      color: #fff;
      padding: 0.8rem 1rem;
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #c9a84c; }
    .form-group input::placeholder { color: #444; }

    .btn-primary {
      width: 100%;
      padding: 0.9rem;
      background: #fff;
      color: #000;
      border: none;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      margin-bottom: 1rem;
    }
    .btn-primary:hover { background: #c9a84c; }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }
    .divider-line { flex: 1; height: 1px; background: #222; }
    .divider-text {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: #444;
    }

    .btn-google {
      width: 100%;
      padding: 0.9rem;
      background: transparent;
      color: #fff;
      border: 1px solid #333;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }
    .btn-google:hover { border-color: #fff; background: #111; }

    .error-msg {
      background: rgba(255,68,68,0.1);
      border: 1px solid rgba(255,68,68,0.3);
      color: #ff4444;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      margin-bottom: 1rem;
      display: none;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.05em;
    }

    .success-msg {
      background: rgba(37,211,102,0.1);
      border: 1px solid rgba(37,211,102,0.3);
      color: #25d366;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      display: none;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.05em;
    }

    .loading { opacity: 0.6; pointer-events: none; }

    .user-panel {
      display: none;
      text-align: center;
    }
    .user-avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 2px solid #c9a84c;
      margin: 0 auto 1rem;
      object-fit: cover;
      display: block;
    }
    .user-avatar-placeholder {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 2px solid #c9a84c;
      margin: 0 auto 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #c9a84c;
      background: #111;
    }
    .user-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 300;
      margin-bottom: 0.25rem;
    }
    .user-email {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: #555;
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
    }
    .btn-shop {
      display: block;
      padding: 0.9rem;
      background: #c9a84c;
      color: #000;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      margin-bottom: 0.75rem;
      transition: opacity 0.2s;
    }
    .btn-shop:hover { opacity: 0.85; }
    .btn-signout {
      width: 100%;
      padding: 0.9rem;
      background: transparent;
      color: #888;
      border: 1px solid #222;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-signout:hover { color: #ff4444; border-color: #ff4444; }
  </style>
</head>
<body>

<nav class="login-nav">
  <a href="/" class="login-nav-logo">STYLUS</a>
  <a href="/" class="login-nav-back">← Back to Store</a>
</nav>

<div class="login-container">
  <div class="login-box">

    <!-- LOGGED IN STATE -->
    <div class="user-panel" id="userPanel">
      <div class="user-avatar-placeholder" id="userAvatar">👤</div>
      <div class="user-name" id="userName">Welcome back</div>
      <div class="user-email" id="userEmail"></div>
      <a href="/" class="btn-shop">Continue Shopping</a>
      <button class="btn-signout" id="signOutBtn">Sign Out</button>
    </div>

    <!-- AUTH FORMS -->
    <div id="authForms">
      <h1 class="login-title">Welcome</h1>
      <p class="login-sub">Sign in to your account</p>

      <div class="tabs">
        <button class="tab active" id="signinTab">Sign In</button>
        <button class="tab" id="signupTab">Create Account</button>
      </div>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <!-- SIGN IN -->
      <div class="tab-content active" id="signinContent">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="signinEmail" placeholder="your@email.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signinPassword" placeholder="••••••••" />
        </div>
        <button class="btn-primary" id="signinBtn">Sign In</button>

        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">OR</span>
          <div class="divider-line"></div>
        </div>

        <button class="btn-google" id="googleSigninBtn">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>
      </div>

      <!-- SIGN UP -->
      <div class="tab-content" id="signupContent">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signupName" placeholder="Your full name" />
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="signupEmail" placeholder="your@email.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="Min. 6 characters" />
        </div>
        <button class="btn-primary" id="signupBtn">Create Account</button>

        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">OR</span>
          <div class="divider-line"></div>
        </div>

        <button class="btn-google" id="googleSignupBtn">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Sign up with Google
        </button>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://fwvqrtutkchlpjhujqbf.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3dnFydHV0a2NobHBqaHVqcWJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MDA2NzUsImV4cCI6MjA5NTQ3NjY3NX0.2-l6oGPzpRhImO6715SET_C_d394e2oYcmBdx5o8_00';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Check if user is already logged in
  supabase.auth.getSession().then(({ data: { session } }) => {
    if (session) showUserPanel(session.user);
  });

  // Listen for auth changes
  supabase.auth.onAuthStateChange((event, session) => {
    if (session) showUserPanel(session.user);
    else showAuthForms();
  });

  function showUserPanel(user) {
    document.getElementById('authForms').style.display = 'none';
    document.getElementById('userPanel').style.display = 'block';
    document.getElementById('userName').textContent = user.user_metadata?.full_name || user.email.split('@')[0];
    document.getElementById('userEmail').textContent = user.email;
    if (user.user_metadata?.avatar_url) {
      const img = document.createElement('img');
      img.src = user.user_metadata.avatar_url;
      img.className = 'user-avatar';
      document.getElementById('userAvatar').replaceWith(img);
    }
  }

  function showAuthForms() {
    document.getElementById('authForms').style.display = 'block';
    document.getElementById('userPanel').style.display = 'none';
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('successMsg').style.display = 'none';
  }

  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
  }

  // TABS
  document.getElementById('signinTab').addEventListener('click', function() {
    this.classList.add('active');
    document.getElementById('signupTab').classList.remove('active');
    document.getElementById('signinContent').classList.add('active');
    document.getElementById('signupContent').classList.remove('active');
  });

  document.getElementById('signupTab').addEventListener('click', function() {
    this.classList.add('active');
    document.getElementById('signinTab').classList.remove('active');
    document.getElementById('signupContent').classList.add('active');
    document.getElementById('signinContent').classList.remove('active');
  });

  // SIGN IN
  document.getElementById('signinBtn').addEventListener('click', async function() {
    const email = document.getElementById('signinEmail').value.trim();
    const password = document.getElementById('signinPassword').value;
    if (!email || !password) { showError('Please fill in all fields'); return; }
    this.textContent = 'Signing in...';
    this.classList.add('loading');
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) { showError(error.message); this.textContent = 'Sign In'; this.classList.remove('loading'); }
    else window.location.href = '/';
  });

  // SIGN UP
  document.getElementById('signupBtn').addEventListener('click', async function() {
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    if (!name || !email || !password) { showError('Please fill in all fields'); return; }
    if (password.length < 6) { showError('Password must be at least 6 characters'); return; }
    this.textContent = 'Creating account...';
    this.classList.add('loading');
    const { error } = await supabase.auth.signUp({
      email, password,
      options: { data: { full_name: name } }
    });
    if (error) { showError(error.message); this.textContent = 'Create Account'; this.classList.remove('loading'); }
    else showSuccess('Account created! Check your email to verify your account.');
    this.textContent = 'Create Account';
    this.classList.remove('loading');
  });

  // GOOGLE LOGIN
  async function googleLogin() {
    const { error } = await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin }
    });
    if (error) showError(error.message);
  }

  document.getElementById('googleSigninBtn').addEventListener('click', googleLogin);
  document.getElementById('googleSignupBtn').addEventListener('click', googleLogin);

  // SIGN OUT
  document.getElementById('signOutBtn').addEventListener('click', async function() {
    await supabase.auth.signOut();
    showAuthForms();
  });
</script>
</body>
</html>
